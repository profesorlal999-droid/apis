<!-- START OF FILE static/auth.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | AUTH</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f3ff; --neon-purple: #bc13fe; --bg-dark: #050505; }
        body {
            background-color: var(--bg-dark); color: #fff; font-family: 'Roboto Mono', monospace;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
            background-image: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .auth-container {
            width: 400px; padding: 40px; border: 1px solid #333; background: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1); position: relative;
        }
        h2 { font-family: 'Orbitron'; color: var(--neon-blue); text-align: center; margin-bottom: 20px; }
        
        .tabs { display: flex; justify-content: space-around; margin-bottom: 30px; border-bottom: 1px solid #333; }
        .tab { 
            padding: 10px; cursor: pointer; font-family: 'Orbitron'; color: #666; width: 50%; text-align: center;
        }
        .tab.active { color: var(--neon-blue); border-bottom: 2px solid var(--neon-blue); }
        
        input {
            width: 100%; padding: 15px; margin-bottom: 20px; background: #000; border: 1px solid #333;
            color: var(--neon-blue); font-family: 'Roboto Mono'; font-size: 1rem; box-sizing: border-box;
            text-align: center;
        }
        input:focus { outline: none; border-color: var(--neon-purple); box-shadow: 0 0 10px rgba(188, 19, 254, 0.3); }
        
        button {
            width: 100%; padding: 15px; background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        
        .message { margin-top: 20px; font-size: 0.8rem; text-align: center; height: 20px; color: var(--neon-purple); }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- TABS -->
        <div class="tabs" id="auth-tabs">
            <div class="tab active" onclick="switchMode('login')">LOGIN</div>
            <div class="tab" onclick="switchMode('register')">REGISTER</div>
        </div>

        <!-- FORM: LOGIN -->
        <div id="login-form" class="fade-in">
            <h2>ACCESS_CONTROL</h2>
            <input type="email" id="login-email" placeholder="IDENTIFIER (EMAIL)">
            <input type="password" id="login-pass" placeholder="ACCESS_KEY (PASSWORD)">
            <button onclick="loginUser()">>>> CONNECT</button>
        </div>

        <!-- FORM: REGISTER -->
        <div id="register-form" class="hidden fade-in">
            <h2>INIT_PROTOCOL</h2>
            <input type="email" id="reg-email" placeholder="SET IDENTIFIER">
            <input type="password" id="reg-pass" placeholder="SET ACCESS_KEY">
            <button onclick="registerUser()">>>> REQUEST_ACCESS</button>
        </div>

        <!-- FORM: VERIFY -->
        <div id="verify-form" class="hidden fade-in">
            <h2>SECURITY_CHECK</h2>
            <p style="text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 20px;">CODE SENT TO EMAIL</p>
            <input type="text" id="ver-code" placeholder="XXXXXX" maxlength="6" style="text-align: center; letter-spacing: 5px; font-size: 1.2rem;">
            <button onclick="verifyUser()">>>> ACTIVATE</button>
        </div>

        <!-- SUCCESS SCREEN -->
        <div id="success-screen" class="hidden fade-in" style="text-align: center;">
            <h2 style="color: #0f0; text-shadow: 0 0 10px #0f0;">ACCESS GRANTED</h2>
            <p>WELCOME TO NEXUS</p>
            <button onclick="window.location.href='/dashboard'" style="margin-top: 20px;">ENTER DASHBOARD</button>
        </div>

        <div id="msg-box" class="message"></div>
    </div>

    <script>
        let currentEmail = "";

        // UI Switcher
        function switchMode(mode) {
            document.getElementById('msg-box').innerText = "";
            
            // Если переключаем на логин
            if(mode === 'login') {
                // Показываем форму логина, скрываем остальные
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
                
                // Переключаем табы
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.querySelectorAll('.tab')[1].classList.remove('active');
                
                // Обновляем URL без перезагрузки страницы (для красоты)
                window.history.pushState({}, "", "/login");
            } 
            // Если переключаем на регистрацию
            else {
                // Показываем форму регистрации, скрываем остальные
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
                
                // Переключаем табы
                document.querySelectorAll('.tab')[0].classList.remove('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
                
                // Обновляем URL без перезагрузки страницы
                window.history.pushState({}, "", "/register");
            }

            // Прячем формы верификации и успеха, если юзер щелкает табы
            document.getElementById('verify-form').classList.add('hidden');
            document.getElementById('success-screen').classList.add('hidden');
            document.getElementById('auth-tabs').style.display = 'flex';
        }

        // 1. REGISTER
        async function registerUser() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;
            const msgBox = document.getElementById('msg-box');
            
            if(localStorage.getItem('nexus_token')) {
                msgBox.innerText = "YOU ARE ALREADY REGISTERED ON THIS DEVICE";
                return;
            }

            if(!email || !password) { msgBox.innerText = "EMPTY FIELDS"; return; }
            msgBox.innerText = "PROCESSING...";

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    currentEmail = email;
                    document.getElementById('register-form').classList.add('hidden');
                    document.getElementById('auth-tabs').style.display = 'none'; // Lock tabs
                    document.getElementById('verify-form').classList.remove('hidden');
                    msgBox.innerText = "CHECK EMAIL (SPAM FOLDER)";
                } else {
                    msgBox.innerText = "ERROR: " + data.detail;
                }
            } catch (e) { msgBox.innerText = "SERVER ERROR"; }
        }

        // 2. VERIFY
        async function verifyUser() {
            const code = document.getElementById('ver-code').value;
            const msgBox = document.getElementById('msg-box');

            try {
                const response = await fetch('/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, code })
                });
                const data = await response.json();

                if (response.ok) {
                    // Auto login on verify
                    localStorage.setItem('nexus_token', data.access_token);
                    
                    document.getElementById('verify-form').classList.add('hidden');
                    document.getElementById('success-screen').classList.remove('hidden');
                    msgBox.innerText = "";
                } else {
                    msgBox.innerText = data.detail;
                }
            } catch (e) { msgBox.innerText = "ERROR"; }
        }

        // 3. LOGIN
        async function loginUser() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            const msgBox = document.getElementById('msg-box');

            if(!email || !password) { msgBox.innerText = "EMPTY FIELDS"; return; }
            msgBox.innerText = "AUTHENTICATING...";

            // OAuth2 Form Data
            const formData = new URLSearchParams();
            formData.append('username', email);
            formData.append('password', password);

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('nexus_token', data.access_token);
                    window.location.href = '/dashboard';
                } else {
                    msgBox.innerText = "DENIED: " + data.detail;
                }
            } catch (e) { msgBox.innerText = "CONNECTION FAILURE"; }
        }

        // --- ВАЖНОЕ ИСПРАВЛЕНИЕ ---
        // Автоматическое переключение на нужную вкладку при загрузке страницы
        // в зависимости от того, по какому URL зашел пользователь (/login или /register)
        window.onload = function() {
            if (window.location.pathname === '/register') {
                switchMode('register');
            } else {
                switchMode('login');
            }
        };
    </script>
</body>
</html>
