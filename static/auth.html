<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | AUTH</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f3ff; --neon-purple: #bc13fe; --bg-dark: #050505; }
        body {
            background-color: var(--bg-dark); color: #fff; font-family: 'Roboto Mono', monospace;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
            background-image: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .auth-container {
            width: 400px; padding: 40px; border: 1px solid #333; background: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1); position: relative;
        }
        h2 { font-family: 'Orbitron'; color: var(--neon-blue); text-align: center; margin-bottom: 20px; }
        
        .tabs { display: flex; justify-content: space-around; margin-bottom: 30px; border-bottom: 1px solid #333; }
        .tab { 
            padding: 10px; cursor: pointer; font-family: 'Orbitron'; color: #666; width: 50%; text-align: center;
        }
        .tab.active { color: var(--neon-blue); border-bottom: 2px solid var(--neon-blue); }
        
        input {
            width: 100%; padding: 15px; margin-bottom: 20px; background: #000; border: 1px solid #333;
            color: var(--neon-blue); font-family: 'Roboto Mono'; font-size: 1rem; box-sizing: border-box;
            text-align: center;
        }
        input:focus { outline: none; border-color: var(--neon-purple); box-shadow: 0 0 10px rgba(188, 19, 254, 0.3); }
        
        button {
            width: 100%; padding: 15px; background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        
        .message { margin-top: 20px; font-size: 0.8rem; text-align: center; height: 20px; color: var(--neon-purple); }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Lang Selector Styles */
        .lang-wrapper { position: absolute; top: 10px; right: 10px; }
        .lang-select {
            background: #000; border: 1px solid #333; color: #888; 
            font-family: 'Roboto Mono'; cursor: pointer; padding: 2px 5px; font-size: 0.8rem;
        }
        .lang-select:hover { border-color: var(--neon-blue); color: #fff; }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Language Selector -->
        <div class="lang-wrapper">
            <select id="lang-select" class="lang-select" onchange="changeLanguage(this.value)">
                <option value="en">EN</option>
                <option value="en-gb">UK</option>
                <option value="ru">RU</option>
                <option value="es">ES</option>
            </select>
        </div>

        <!-- TABS -->
        <div class="tabs" id="auth-tabs">
            <div class="tab active" onclick="switchMode('login')" data-i18n="tab_login">LOGIN</div>
            <div class="tab" onclick="switchMode('register')" data-i18n="tab_register">REGISTER</div>
        </div>

        <!-- FORM: LOGIN -->
        <div id="login-form" class="fade-in">
            <h2 data-i18n="h_access">ACCESS_CONTROL</h2>
            <input type="email" id="login-email" data-i18n="ph_email" placeholder="IDENTIFIER (EMAIL)">
            <input type="password" id="login-pass" data-i18n="ph_pass" placeholder="ACCESS_KEY (PASSWORD)">
            <button onclick="loginUser()" data-i18n="btn_connect">>>> CONNECT</button>
        </div>

        <!-- FORM: REGISTER -->
        <div id="register-form" class="hidden fade-in">
            <h2 data-i18n="h_init">INIT_PROTOCOL</h2>
            <input type="email" id="reg-email" data-i18n="ph_set_id" placeholder="SET IDENTIFIER">
            <input type="password" id="reg-pass" data-i18n="ph_set_key" placeholder="SET ACCESS_KEY">
            <button onclick="registerUser()" data-i18n="btn_req_access">>>> REQUEST_ACCESS</button>
        </div>

        <!-- FORM: VERIFY -->
        <div id="verify-form" class="hidden fade-in">
            <h2 data-i18n="h_security">SECURITY_CHECK</h2>
            <p style="text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 20px;" data-i18n="txt_code_sent">CODE SENT TO EMAIL</p>
            <input type="text" id="ver-code" placeholder="XXXXXX" maxlength="6" style="text-align: center; letter-spacing: 5px; font-size: 1.2rem;">
            <button onclick="verifyUser()" data-i18n="btn_activate">>>> ACTIVATE</button>
        </div>

        <!-- SUCCESS SCREEN -->
        <div id="success-screen" class="hidden fade-in" style="text-align: center;">
            <h2 style="color: #0f0; text-shadow: 0 0 10px #0f0;" data-i18n="h_granted">ACCESS GRANTED</h2>
            <p data-i18n="txt_welcome">WELCOME TO NEXUS</p>
            <button onclick="window.location.href='/dashboard'" style="margin-top: 20px;" data-i18n="btn_dashboard">ENTER DASHBOARD</button>
        </div>

        <div id="msg-box" class="message"></div>
    </div>

    <script>
        // Translations
        const translations = {
            "en": {
                "tab_login": "LOGIN", "tab_register": "REGISTER",
                "h_access": "ACCESS_CONTROL", "ph_email": "IDENTIFIER (EMAIL)", "ph_pass": "ACCESS_KEY (PASSWORD)", "btn_connect": ">>> CONNECT",
                "h_init": "INIT_PROTOCOL", "ph_set_id": "SET IDENTIFIER", "ph_set_key": "SET ACCESS_KEY", "btn_req_access": ">>> REQUEST_ACCESS",
                "h_security": "SECURITY_CHECK", "txt_code_sent": "CODE SENT TO EMAIL", "btn_activate": ">>> ACTIVATE",
                "h_granted": "ACCESS GRANTED", "txt_welcome": "WELCOME TO NEXUS", "btn_dashboard": "ENTER DASHBOARD",
                "msg_processing": "PROCESSING...", "msg_check_email": "CHECK EMAIL (SPAM FOLDER)", "msg_empty": "EMPTY FIELDS"
            },
            "en-gb": {
                "tab_login": "LOG IN", "tab_register": "REGISTER",
                "h_access": "ACCESS_CONTROL", "ph_email": "IDENTIFIER (EMAIL)", "ph_pass": "ACCESS_KEY (PASSWORD)", "btn_connect": ">>> CONNECT",
                "h_init": "INIT_PROTOCOL", "ph_set_id": "SET IDENTIFIER", "ph_set_key": "SET ACCESS_KEY", "btn_req_access": ">>> REQUEST_ACCESS",
                "h_security": "SECURITY_CHECK", "txt_code_sent": "CODE SENT TO EMAIL", "btn_activate": ">>> ACTIVATE",
                "h_granted": "ACCESS GRANTED", "txt_welcome": "WELCOME TO NEXUS", "btn_dashboard": "ENTER DASHBOARD",
                "msg_processing": "PROCESSING...", "msg_check_email": "CHECK EMAIL (SPAM FOLDER)", "msg_empty": "EMPTY FIELDS"
            },
            "ru": {
                "tab_login": "ВХОД", "tab_register": "РЕГИСТРАЦИЯ",
                "h_access": "КОНТРОЛЬ ДОСТУПА", "ph_email": "ИДЕНТИФИКАТОР (EMAIL)", "ph_pass": "КЛЮЧ ДОСТУПА (ПАРОЛЬ)", "btn_connect": ">>> ПОДКЛЮЧИТЬСЯ",
                "h_init": "ПРОТОКОЛ ИНИЦ.", "ph_set_id": "ЗАДАТЬ ID", "ph_set_key": "ЗАДАТЬ ПАРОЛЬ", "btn_req_access": ">>> ЗАПРОС ДОСТУПА",
                "h_security": "ПРОВЕРКА", "txt_code_sent": "КОД ОТПРАВЛЕН НА EMAIL", "btn_activate": ">>> АКТИВИРОВАТЬ",
                "h_granted": "ДОСТУП РАЗРЕШЕН", "txt_welcome": "ДОБРО ПОЖАЛОВАТЬ В NEXUS", "btn_dashboard": "В КАБИНЕТ",
                "msg_processing": "ОБРАБОТКА...", "msg_check_email": "ПРОВЕРЬ ПОЧТУ (СПАМ)", "msg_empty": "ПУСТЫЕ ПОЛЯ"
            },
            "es": {
                "tab_login": "ENTRAR", "tab_register": "REGISTRO",
                "h_access": "CONTROL ACCESO", "ph_email": "IDENTIFICADOR (EMAIL)", "ph_pass": "CLAVE ACCESO (CONTRASEÑA)", "btn_connect": ">>> CONECTAR",
                "h_init": "PROTOCOLO INIC.", "ph_set_id": "FIJAR ID", "ph_set_key": "FIJAR CLAVE", "btn_req_access": ">>> SOLICITAR ACCESO",
                "h_security": "SEGURIDAD", "txt_code_sent": "CÓDIGO ENVIADO AL EMAIL", "btn_activate": ">>> ACTIVAR",
                "h_granted": "ACCESO CONCEDIDO", "txt_welcome": "BIENVENIDO A NEXUS", "btn_dashboard": "ENTRAR AL PANEL",
                "msg_processing": "PROCESANDO...", "msg_check_email": "REVISA EMAIL (SPAM)", "msg_empty": "CAMPOS VACÍOS"
            }
        };

        function changeLanguage(lang) {
            localStorage.setItem('nexus_lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    if (el.tagName === 'INPUT') el.placeholder = translations[lang][key];
                    else el.innerText = translations[lang][key];
                }
            });
        }
        
        // Init Lang
        const savedLang = localStorage.getItem('nexus_lang') || 'en';
        document.getElementById('lang-select').value = savedLang;
        changeLanguage(savedLang);

        // Core Logic
        let currentEmail = "";
        function getMsg(key) {
            const l = localStorage.getItem('nexus_lang') || 'en';
            return translations[l][key] || key;
        }

        function switchMode(mode) {
            document.getElementById('msg-box').innerText = "";
            if(mode === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.querySelectorAll('.tab')[1].classList.remove('active');
                window.history.pushState({}, "", "/login");
            } else {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
                document.querySelectorAll('.tab')[0].classList.remove('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
                window.history.pushState({}, "", "/register");
            }
            document.getElementById('verify-form').classList.add('hidden');
            document.getElementById('success-screen').classList.add('hidden');
            document.getElementById('auth-tabs').style.display = 'flex';
        }

        async function registerUser() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;
            const msgBox = document.getElementById('msg-box');
            if(!email || !password) { msgBox.innerText = getMsg("msg_empty"); return; }
            msgBox.innerText = getMsg("msg_processing");

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    currentEmail = email;
                    document.getElementById('register-form').classList.add('hidden');
                    document.getElementById('auth-tabs').style.display = 'none';
                    document.getElementById('verify-form').classList.remove('hidden');
                    msgBox.innerText = getMsg("msg_check_email");
                } else { msgBox.innerText = "ERROR: " + data.detail; }
            } catch (e) { msgBox.innerText = "SERVER ERROR"; }
        }

        async function verifyUser() {
            const code = document.getElementById('ver-code').value;
            const msgBox = document.getElementById('msg-box');
            try {
                const response = await fetch('/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, code })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('nexus_token', data.access_token);
                    document.getElementById('verify-form').classList.add('hidden');
                    document.getElementById('success-screen').classList.remove('hidden');
                    msgBox.innerText = "";
                } else { msgBox.innerText = data.detail; }
            } catch (e) { msgBox.innerText = "ERROR"; }
        }

        async function loginUser() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            const msgBox = document.getElementById('msg-box');
            if(!email || !password) { msgBox.innerText = getMsg("msg_empty"); return; }
            msgBox.innerText = getMsg("msg_processing");
            const formData = new URLSearchParams();
            formData.append('username', email);
            formData.append('password', password);
            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('nexus_token', data.access_token);
                    window.location.href = '/dashboard';
                } else { msgBox.innerText = "DENIED: " + data.detail; }
            } catch (e) { msgBox.innerText = "CONNECTION FAILURE"; }
        }

        window.onload = function() {
            if (window.location.pathname === '/register') switchMode('register');
            else switchMode('login');
        };
    </script>
</body>
</html>
